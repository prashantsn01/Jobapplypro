# render.yaml — Render Blueprint

services:
  # ── Node.js Backend ────────────────────────────────────────────────────────
  - type: web
    name: jobapplypro-server
    runtime: node
    region: oregon
    plan: free

    rootDir: server
    buildCommand: npm install && npx prisma generate

    # ✅ FIXED start command
    startCommand: node index.js

    healthCheckPath: /health

    autoDeploy: true
    branch: main

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      # ── Database ──────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: jobapplypro-db
          property: connectionString

      # ── Redis ─────────────────────────────────────────────────────────────
      - key: REDIS_URL
        fromService:
          name: jobapplypro-redis
          type: redis
          property: connectionString

      # ── Secrets (set manually in Render dashboard) ─────────────────────────
      - key: SESSION_SECRET
        sync: false

      - key: ENCRYPTION_KEY
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      - key: GOOGLE_REDIRECT_URI
        sync: false
        # set in dashboard:
        # https://jobapplypro-server.onrender.com/auth/google/callback

      - key: CLIENT_URL
        sync: false
        # example:
        # https://jobapplypro.vercel.app

      - key: VERCEL_PROJECT_SLUG
        sync: false

      - key: LINKEDIN_COOKIE
        sync: false

      - key: NAUKRI_COOKIE
        sync: false

  # ── Redis (✅ FIXED with IP allow list) ────────────────────────────────────
  - type: redis
    name: jobapplypro-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

databases:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  - name: jobapplypro-db
    region: oregon
    plan: free
    databaseName: jobapplypro
    user: jap
