# render.yaml — Render Blueprint
# Commit this file to your repo root.
# In Render dashboard: New → Blueprint → connect your repo → deploy.
# Render reads this file and creates all services automatically.

services:
  # ── Node.js Backend ────────────────────────────────────────────────────────
  - type: web
    name: jobapplypro-server
    runtime: node
    region: oregon           # or singapore for India-proximity
    plan: free               # upgrade to starter ($7/mo) for always-on

    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: node scripts/start.sh || sh scripts/start.sh

    healthCheckPath: /health

    # Auto-deploy on every push to main
    autoDeploy: true
    branch: main

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      # ── Database — auto-wired from the postgres service below ──────────────
      - key: DATABASE_URL
        fromDatabase:
          name: jobapplypro-db
          property: connectionString

      # ── Redis — auto-wired from the redis service below ───────────────────
      - key: REDIS_URL
        fromService:
          name: jobapplypro-redis
          type: redis
          property: connectionString

      # ── Secrets — fill these in Render dashboard → Environment ────────────
      # After first deploy: Render dashboard → jobapplypro-server → Environment
      - key: SESSION_SECRET
        sync: false          # means: set manually in dashboard

      - key: ENCRYPTION_KEY
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      - key: GOOGLE_REDIRECT_URI
        sync: false          # set to: https://jobapplypro-server.onrender.com/auth/google/callback

      - key: CLIENT_URL
        sync: false          # set to: https://jobapplypro.vercel.app

      - key: VERCEL_PROJECT_SLUG
        sync: false          # set to: jobapplypro (your Vercel project name)

      # Optional scraper cookies
      - key: LINKEDIN_COOKIE
        sync: false
      - key: NAUKRI_COOKIE
        sync: false

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: jobapplypro-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  - name: jobapplypro-db
    region: oregon
    plan: free
    databaseName: jobapplypro
    user: jap
