version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-jobapplypro}
      POSTGRES_USER:     ${POSTGRES_USER:-jap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ✅ NO ports exposed — only accessible within Docker network
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jap} -d ${POSTGRES_DB:-jobapplypro}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeMe123}
    volumes:
      - redis_data:/data
    # ✅ NO ports exposed
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeMe123}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Backend ─────────────────────────────────────────────────────────────
  server:
    build:
      context:    ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:    production
      DATABASE_URL: postgresql://${POSTGRES_USER:-jap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jobapplypro}
      REDIS_URL:   redis://:${REDIS_PASSWORD:-changeMe123}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── Frontend (nginx) ─────────────────────────────────────────────────────
  client:
    build:
      context:    ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
      - "443:443"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
